# Reference MultiTargetEvalSpec: Canada Food CPI, 18-month ahead — protected eval window
#
# Protected eval window covering the four most recent July origins (Jul 2021 →
# Jul 2024).  All four resolve by Jan 2026 and are now available in StatCan data.
#
# Budget semantics: one call to multi_evaluate() counts as ONE run regardless
# of how many food categories are included.  The budget governs evaluation
# *sessions*, not individual series.  Spend it deliberately.
#
# Use food_cpi_18m_backtest.yaml freely for tuning; run this spec only when
# you have a predictor you genuinely believe in.
#
# Loading:
#
#   import yaml
#   from pathlib import Path
#   from aieng.forecasting.evaluation import (
#       MultiTargetEvalSpec, EvalTracker, multi_evaluate,
#   )
#
#   with open("reference_specs/food_cpi/food_cpi_18m_eval.yaml") as f:
#       spec = MultiTargetEvalSpec.model_validate(yaml.safe_load(f))
#   tracker = EvalTracker(Path("eval_runs.yaml"))
#   results = multi_evaluate(predictor=my_predictor, spec=spec,
#                            data_service=svc, tracker=tracker)

spec_id: food_cpi_18m_eval

tasks:
  - task_id: food_cpi_overall_18m
    target_series_id: cpi_food_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Food (overall, 2002=100), 18 months ahead.

  - task_id: food_cpi_bakery_cereal_18m
    target_series_id: cpi_bakery_cereal_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Bakery and cereal products (excl. baby food), 18 months ahead.

  - task_id: food_cpi_dairy_eggs_18m
    target_series_id: cpi_dairy_eggs_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Dairy products and eggs, 18 months ahead.

  - task_id: food_cpi_fish_seafood_18m
    target_series_id: cpi_fish_seafood_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Fish, seafood and other marine products, 18 months ahead.

  - task_id: food_cpi_restaurants_18m
    target_series_id: cpi_restaurants_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Food purchased from restaurants, 18 months ahead.

  - task_id: food_cpi_fruit_preparations_nuts_18m
    target_series_id: cpi_fruit_preparations_nuts_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Fruit, fruit preparations and nuts, 18 months ahead.

  - task_id: food_cpi_meat_18m
    target_series_id: cpi_meat_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Meat, 18 months ahead.

  - task_id: food_cpi_other_food_18m
    target_series_id: cpi_other_food_nonalcoholic_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Other food products and non-alcoholic beverages, 18 months ahead.

  - task_id: food_cpi_vegetables_18m
    target_series_id: cpi_vegetables_preparations_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Vegetables and vegetable preparations, 18 months ahead.

# Jul 2021 → Jul 2024 = 4 annual origins; all resolve by Jan 2026.
start: "2021-07-01"
end: "2024-07-01"
stride: 12
warmup: 24

# Budget: 5 multi_evaluate() calls per participant.
max_runs: 5
