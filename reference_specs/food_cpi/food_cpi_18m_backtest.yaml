# Reference MultiTargetBacktestSpec: Canada Food CPI, 18-month ahead — CFPR-replica
#
# Replicates the Canada's Food Price Report (CFPR) evaluation discipline:
#
#   * Horizon: 18 months ahead — matching the CFPR annual forecast cycle.
#   * Origins: July 1 of each year, stride=12 months (annual).
#   * Rationale: July is when the most recently published CPI data (for May
#     or June) is in hand.  The CFPR is typically released in November /
#     December, projecting 18 months forward from this information base.
#   * Window: July 2009 → July 2024 = 16 annual origins, spanning three
#     distinct macro regimes: low-inflation (2010-19), COVID shock (2020-21),
#     and the food-price surge/retreat (2021-24).  The last origin (Jul 2024)
#     resolves to Jan 2026, which is available in the StatCan release as of
#     ~Feb 2026.
#
# This spec is the open backtesting resource — run it as many times as you
# like to tune predictors and build intuition.  Use food_cpi_18m_eval.yaml
# for the budget-limited protected evaluation.
#
# Prerequisites:
#   uv run python scripts/fetch_cpi.py     # StatCan food CPI cache
#   uv run python scripts/fetch_fred.py    # FRED covariate cache
#
# Loading:
#
#   import yaml
#   from aieng.forecasting.evaluation import MultiTargetBacktestSpec, multi_backtest
#
#   with open("reference_specs/food_cpi/food_cpi_18m_backtest.yaml") as f:
#       spec = MultiTargetBacktestSpec.model_validate(yaml.safe_load(f))
#   results = multi_backtest(predictor=my_predictor, spec=spec, data_service=svc)

tasks:
  - task_id: food_cpi_overall_18m
    target_series_id: cpi_food_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Food (overall, 2002=100), 18 months ahead.

  - task_id: food_cpi_bakery_cereal_18m
    target_series_id: cpi_bakery_cereal_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Bakery and cereal products (excl. baby food), 18 months ahead.

  - task_id: food_cpi_dairy_eggs_18m
    target_series_id: cpi_dairy_eggs_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Dairy products and eggs, 18 months ahead.

  - task_id: food_cpi_fish_seafood_18m
    target_series_id: cpi_fish_seafood_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Fish, seafood and other marine products, 18 months ahead.

  - task_id: food_cpi_restaurants_18m
    target_series_id: cpi_restaurants_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Food purchased from restaurants, 18 months ahead.

  - task_id: food_cpi_fruit_preparations_nuts_18m
    target_series_id: cpi_fruit_preparations_nuts_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Fruit, fruit preparations and nuts, 18 months ahead.

  - task_id: food_cpi_meat_18m
    target_series_id: cpi_meat_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Meat, 18 months ahead.

  - task_id: food_cpi_other_food_18m
    target_series_id: cpi_other_food_nonalcoholic_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Other food products and non-alcoholic beverages, 18 months ahead.

  - task_id: food_cpi_vegetables_18m
    target_series_id: cpi_vegetables_preparations_canada
    horizons: [18]
    frequency: MS
    description: Canada CPI Vegetables and vegetable preparations, 18 months ahead.

# July 2009 → July 2024 = 16 annual origins.
start: "2009-07-01"
end: "2024-07-01"

# stride=12 on monthly (MS) frequency → one origin per July.
stride: 12

# Require 24 months of history before the first forecast origin.
warmup: 24
